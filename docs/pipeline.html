<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Embodied Eval Orchestrator — Pipeline</title>
<style>
  html, body { margin: 0; padding: 0; background: #0b1020; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif; color: #e6edf7; }
  .wrap { display: grid; place-items: center; padding: 24px; }
  svg { width: min(100%, 1680px); height: auto; background: #0b1020; border-radius: 8px; }
  .note { margin: 12px 0 0; font-size: 12px; color: #8895ad; }
</style>
</head>
<body>
<div class="wrap">
<!--
  Aspect: 1680 x 960. Fits a 16:9 video slide at 1920x1080 with letterbox.
  Palette: dark navy canvas; phase colors match src/ui/app.py PHASE_COLORS.
    Planner  #60a5fa  blue
    Rollout  #c084fc  purple
    Judge    #fb923c  orange
    Report   #4ade80  green
-->
<svg viewBox="0 0 1680 960" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Embodied Eval Orchestrator pipeline">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cfd6e4" />
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7a94" />
    </marker>
    <!-- Soft glow for the agent band -->
    <linearGradient id="agentBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#1e2a4a" />
      <stop offset="100%" stop-color="#172036" />
    </linearGradient>
    <linearGradient id="simBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#11182b" />
      <stop offset="100%" stop-color="#0e1526" />
    </linearGradient>
    <!-- Phase card backgrounds: tinted by phase color -->
    <linearGradient id="bgPlanner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a2a4a" />
      <stop offset="100%" stop-color="#142039" />
    </linearGradient>
    <linearGradient id="bgRollout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a1d44" />
      <stop offset="100%" stop-color="#1e1633" />
    </linearGradient>
    <linearGradient id="bgJudge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a2410" />
      <stop offset="100%" stop-color="#281a0e" />
    </linearGradient>
    <linearGradient id="bgReport" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#12331f" />
      <stop offset="100%" stop-color="#0f2418" />
    </linearGradient>
    <filter id="soft" x="-5%" y="-10%" width="110%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- ==========================================================
       Title strip
       ========================================================== -->
  <g>
    <text x="40" y="50" font-size="26" font-weight="700" fill="#e6edf7">Embodied Eval Orchestrator</text>
    <text x="40" y="76" font-size="14" fill="#8ea0bf">
      One Opus 4.7 Managed Agents session runs an end-to-end robot manipulation eval: plan → run in sim → watch videos → report.
    </text>
    <!-- Legend: Opus 4.7 capabilities exercised -->
    <g transform="translate(1100,36)" font-size="11" fill="#a8b4cc">
      <rect x="0" y="0" width="540" height="56" rx="6" fill="#111a30" stroke="#22304e" />
      <text x="12" y="18" fill="#e6edf7" font-weight="600">Opus 4.7 surfaces exercised</text>
      <text x="12" y="36">• 2576 px vision + pixel pointing</text>
      <text x="200" y="36">• 1 M context for clustering</text>
      <text x="380" y="36">• File-based memory</text>
      <text x="12" y="50">• Managed Agents sessions</text>
      <text x="200" y="50">• Two-pass visual forensics</text>
      <text x="380" y="50">• Auto effort control</text>
    </g>
  </g>

  <!-- ==========================================================
       INPUT chip (left)
       ========================================================== -->
  <g transform="translate(40,150)">
    <rect x="0" y="0" width="190" height="120" rx="10" fill="#111a30" stroke="#2a3a5c" />
    <text x="16" y="28" font-size="12" fill="#8ea0bf" font-weight="600" letter-spacing="0.08em">INPUT</text>
    <text x="16" y="56" font-size="14" fill="#e6edf7" font-weight="600">Evaluation goal</text>
    <text x="16" y="78" font-size="12" fill="#cfd6e4" font-style="italic">&#8220;grade pick reliability</text>
    <text x="16" y="94" font-size="12" fill="#cfd6e4" font-style="italic">across failure modes&#8221;</text>
    <text x="16" y="112" font-size="11" fill="#8ea0bf">one line of English</text>
  </g>

  <!-- arrow to planner -->
  <path d="M 232 210 L 290 210" stroke="#cfd6e4" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- ==========================================================
       AGENT BAND — frames the four phases to show it's ONE session
       ========================================================== -->
  <g>
    <rect x="290" y="115" width="1320" height="300" rx="14" fill="url(#agentBand)" stroke="#2a3a5c" />
    <text x="310" y="138" font-size="12" fill="#8ea0bf" font-weight="600" letter-spacing="0.10em">ONE MANAGED AGENTS SESSION · Opus 4.7</text>
    <text x="310" y="156" font-size="11" fill="#6f7e9a">
      phase markers advance the same session; all artifacts persist to /memories/ between phases
    </text>
    <!-- /memories badge -->
    <g transform="translate(1430,128)">
      <rect x="0" y="0" width="170" height="38" rx="8" fill="#0d1528" stroke="#3a4a70" />
      <text x="12" y="16" font-size="10" fill="#8ea0bf" font-weight="600" letter-spacing="0.08em">FILE-BASED MEMORY</text>
      <text x="12" y="30" font-size="12" fill="#e6edf7" font-family="ui-monospace, Menlo, monospace">/memories/</text>
    </g>
  </g>

  <!-- ==========================================================
       PHASE CARDS
       ========================================================== -->
  <!-- positions: x 310, 630, 950, 1270  (width 300, gap 20) -->

  <!-- 1. PLANNER -->
  <g transform="translate(310,180)">
    <rect width="300" height="220" rx="12" fill="url(#bgPlanner)" stroke="#60a5fa" stroke-width="1.5" />
    <rect x="0" y="0" width="300" height="34" rx="12" fill="#60a5fa" opacity="0.18" />
    <circle cx="22" cy="17" r="9" fill="#60a5fa" />
    <text x="22" y="21" font-size="11" font-weight="700" fill="#0b1020" text-anchor="middle">1</text>
    <text x="40" y="22" font-size="14" font-weight="700" fill="#e6edf7">PLANNER</text>
    <text x="230" y="22" font-size="10" fill="#8ea0bf" text-anchor="end">think + write</text>

    <text x="16" y="60" font-size="12" fill="#cfd6e4">
      <tspan x="16" dy="0">Designs a test suite for</tspan>
      <tspan x="16" dy="16">the stated goal. Picks</tspan>
      <tspan x="16" dy="16">scenarios, seeds, injected</tspan>
      <tspan x="16" dy="16">failures, success criteria.</tspan>
    </text>
    <!-- artifacts -->
    <g transform="translate(16,140)" font-family="ui-monospace, Menlo, monospace" font-size="11">
      <text fill="#8ea0bf" font-family="-apple-system, sans-serif" font-size="10" letter-spacing="0.08em">WRITES</text>
      <text x="0" y="18" fill="#9dc4ff">plan.md</text>
      <text x="0" y="34" fill="#9dc4ff">test_matrix.csv</text>
      <text x="0" y="50" fill="#9dc4ff">taxonomy.md</text>
      <text x="0" y="72" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">
        rows mix clean + injected;
      </text>
      <text x="0" y="85" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">
        expected_label is the truth
      </text>
    </g>
  </g>

  <!-- 2. ROLLOUT -->
  <g transform="translate(630,180)">
    <rect width="300" height="220" rx="12" fill="url(#bgRollout)" stroke="#c084fc" stroke-width="1.5" />
    <rect x="0" y="0" width="300" height="34" rx="12" fill="#c084fc" opacity="0.18" />
    <circle cx="22" cy="17" r="9" fill="#c084fc" />
    <text x="22" y="21" font-size="11" font-weight="700" fill="#0b1020" text-anchor="middle">2</text>
    <text x="40" y="22" font-size="14" font-weight="700" fill="#e6edf7">ROLLOUT</text>
    <text x="230" y="22" font-size="10" fill="#8ea0bf" text-anchor="end">tool: rollout()</text>

    <text x="16" y="60" font-size="12" fill="#cfd6e4">
      <tspan x="16" dy="0">Calls the sim adapter once</tspan>
      <tspan x="16" dy="16">per matrix row. Each run</tspan>
      <tspan x="16" dy="16">records an mp4 + outcome.</tspan>
    </text>

    <g transform="translate(16,128)" font-family="ui-monospace, Menlo, monospace" font-size="11">
      <text fill="#8ea0bf" font-family="-apple-system, sans-serif" font-size="10" letter-spacing="0.08em">WRITES</text>
      <text x="0" y="18" fill="#e4bdff">rollouts/&lt;id&gt;.mp4</text>
      <text x="0" y="34" fill="#e4bdff">rollouts/results.jsonl</text>
      <text x="0" y="56" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">
        each line: success, steps,
      </text>
      <text x="0" y="69" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">
        video_path, ground_truth
      </text>
    </g>
  </g>

  <!-- 3. JUDGE -->
  <g transform="translate(950,180)">
    <rect width="300" height="220" rx="12" fill="url(#bgJudge)" stroke="#fb923c" stroke-width="1.5" />
    <rect x="0" y="0" width="300" height="34" rx="12" fill="#fb923c" opacity="0.18" />
    <circle cx="22" cy="17" r="9" fill="#fb923c" />
    <text x="22" y="21" font-size="11" font-weight="700" fill="#0b1020" text-anchor="middle">3</text>
    <text x="40" y="22" font-size="14" font-weight="700" fill="#e6edf7">VISION JUDGE</text>
    <text x="275" y="22" font-size="10" fill="#8ea0bf" text-anchor="end">tools: coarse, fine</text>

    <!-- two-pass inline sub-diagram -->
    <g transform="translate(14,50)" font-size="11">
      <rect x="0" y="0" width="130" height="74" rx="8" fill="#1e1405" stroke="#6a4218" />
      <text x="10" y="15" font-size="10" fill="#fb923c" font-weight="700">PASS 1 · coarse</text>
      <text x="10" y="32" fill="#ffd9b3">14 frames · 768 px</text>
      <text x="10" y="48" fill="#ffd9b3">binary verdict</text>
      <text x="10" y="64" fill="#ffd9b3">+ failure range</text>

      <!-- arrow between -->
      <path d="M 134 37 L 156 37" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)" />

      <rect x="158" y="0" width="116" height="74" rx="8" fill="#1e1405" stroke="#6a4218" />
      <text x="168" y="15" font-size="10" fill="#fb923c" font-weight="700">PASS 2 · fine</text>
      <text x="168" y="32" fill="#ffd9b3">10 frames · 2576 px</text>
      <text x="168" y="48" fill="#ffd9b3">taxonomy label</text>
      <text x="168" y="64" fill="#ffd9b3">+ pixel point</text>
    </g>

    <text x="16" y="145" font-size="10" fill="#8ea0bf">Pass 2 runs only on Pass-1 failures — cheap filter, expensive forensic.</text>

    <g transform="translate(16,162)" font-family="ui-monospace, Menlo, monospace" font-size="11">
      <text fill="#8ea0bf" font-family="-apple-system, sans-serif" font-size="10" letter-spacing="0.08em">WRITES</text>
      <text x="0" y="18" fill="#ffc896">findings.jsonl</text>
      <text x="0" y="38" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">
        judge is blind to ground truth
      </text>
    </g>
  </g>

  <!-- 4. REPORT -->
  <g transform="translate(1270,180)">
    <rect width="320" height="220" rx="12" fill="url(#bgReport)" stroke="#4ade80" stroke-width="1.5" />
    <rect x="0" y="0" width="320" height="34" rx="12" fill="#4ade80" opacity="0.18" />
    <circle cx="22" cy="17" r="9" fill="#4ade80" />
    <text x="22" y="21" font-size="11" font-weight="700" fill="#0b1020" text-anchor="middle">4</text>
    <text x="40" y="22" font-size="14" font-weight="700" fill="#e6edf7">REPORT</text>
    <text x="300" y="22" font-size="10" fill="#8ea0bf" text-anchor="end">1 M context · no k-means</text>

    <text x="16" y="60" font-size="12" fill="#cfd6e4">
      <tspan x="16" dy="0">Loads the full matrix +</tspan>
      <tspan x="16" dy="16">findings into one context</tspan>
      <tspan x="16" dy="16">window, clusters themes,</tspan>
      <tspan x="16" dy="16">computes precision/recall</tspan>
      <tspan x="16" dy="16">vs injected ground truth.</tspan>
    </text>

    <g transform="translate(16,154)" font-family="ui-monospace, Menlo, monospace" font-size="11">
      <text fill="#8ea0bf" font-family="-apple-system, sans-serif" font-size="10" letter-spacing="0.08em">WRITES</text>
      <text x="0" y="18" fill="#b6f0c4">report.md</text>
      <text x="0" y="38" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">summary · clusters · confusion</text>
      <text x="0" y="51" font-family="-apple-system, sans-serif" font-size="10" fill="#6f7e9a">matrix · pipeline vs. baseline</text>
    </g>
  </g>

  <!-- arrows between phases -->
  <g stroke="#cfd6e4" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 614 290 L 628 290" />
    <path d="M 934 290 L 948 290" />
    <path d="M 1254 290 L 1268 290" />
  </g>

  <!-- ==========================================================
       SIM SUBSTRATE (bottom band)
       ========================================================== -->
  <g>
    <rect x="290" y="480" width="1320" height="220" rx="14" fill="url(#simBand)" stroke="#1f2b46" />
    <text x="310" y="504" font-size="12" fill="#8ea0bf" font-weight="600" letter-spacing="0.10em">SIM SUBSTRATE · MuJoCo + robosuite</text>
    <text x="310" y="522" font-size="11" fill="#6f7e9a">
      The orchestrator only talks to this layer through src/sim/adapter.py — run_rollout(config) → RolloutResult.
    </text>

    <!-- Pretrained policy block -->
    <g transform="translate(330,540)">
      <rect width="360" height="140" rx="10" fill="#0f1729" stroke="#2a3a5c" />
      <text x="16" y="22" font-size="12" font-weight="700" fill="#e6edf7">Pretrained BC-RNN</text>
      <text x="16" y="40" font-size="11" fill="#9fb0cf">robomimic v0.3 · Lift + cube_xy_jitter</text>
      <text x="16" y="62" font-size="11" fill="#9fb0cf">100% @ 0 m → ~38% fail @ 0.15 m jitter</text>
      <text x="16" y="86" font-size="10" fill="#6f7e9a">Real policy under environmental stress.</text>
      <text x="16" y="99" font-size="10" fill="#6f7e9a">Calibration P decorates these findings.</text>
      <text x="16" y="125" font-size="10" fill="#8ea0bf" font-style="italic">“grade the shipped model”</text>
    </g>

    <!-- Scripted policy block with injected failures = ground truth -->
    <g transform="translate(720,540)">
      <rect width="460" height="140" rx="10" fill="#0f1729" stroke="#2a3a5c" />
      <text x="16" y="22" font-size="12" font-weight="700" fill="#e6edf7">Scripted IK picker · <tspan fill="#ffd27a">injected failures</tspan></text>
      <text x="16" y="40" font-size="11" fill="#9fb0cf">Lift env · 4 failure knobs → known taxonomy labels</text>

      <!-- Failure knobs as chips -->
      <g transform="translate(16,52)" font-size="10">
        <g>
          <rect width="108" height="22" rx="6" fill="#2a1d44" stroke="#6a4a9c" />
          <text x="8" y="15" fill="#e4bdff">action_noise ≥ .1</text>
        </g>
        <g transform="translate(116,0)">
          <rect width="108" height="22" rx="6" fill="#2a1d44" stroke="#6a4a9c" />
          <text x="8" y="15" fill="#e4bdff">premature_close</text>
        </g>
        <g transform="translate(232,0)">
          <rect width="100" height="22" rx="6" fill="#2a1d44" stroke="#6a4a9c" />
          <text x="8" y="15" fill="#e4bdff">angle_offset</text>
        </g>
        <g transform="translate(340,0)">
          <rect width="104" height="22" rx="6" fill="#2a1d44" stroke="#6a4a9c" />
          <text x="8" y="15" fill="#e4bdff">grip_scale &lt; .7</text>
        </g>
      </g>

      <text x="16" y="98" font-size="10" fill="#6f7e9a">Knobs steer the policy toward missed_approach,</text>
      <text x="16" y="111" font-size="10" fill="#6f7e9a">gripper_slipped, or gripper_not_open (3 labels).</text>
      <text x="16" y="128" font-size="10" fill="#ffd27a" font-style="italic">Human labels on a sampled subset — that's the calibration GT.</text>
    </g>

    <!-- Adapter chip -->
    <g transform="translate(1210,540)">
      <rect width="360" height="140" rx="10" fill="#0f1729" stroke="#2a3a5c" />
      <text x="16" y="22" font-size="12" font-weight="700" fill="#e6edf7">src/sim/adapter.py</text>
      <text x="16" y="40" font-size="11" fill="#9fb0cf">run_rollout(RolloutConfig) → RolloutResult</text>
      <text x="16" y="62" font-size="10" fill="#6f7e9a">Single boundary. Orchestrator never imports</text>
      <text x="16" y="75" font-size="10" fill="#6f7e9a">MuJoCo / robosuite — so the same pipeline</text>
      <text x="16" y="88" font-size="10" fill="#6f7e9a">could instead read real robot logs (mp4).</text>
      <text x="16" y="112" font-size="10" fill="#8ea0bf">→ writes rollouts/&lt;id&gt;.mp4</text>
      <text x="16" y="126" font-size="10" fill="#8ea0bf">→ returns success + ground_truth_label</text>
    </g>
  </g>

  <!-- arrow from Rollout card down into sim adapter -->
  <g stroke="#6b7a94" stroke-width="1.8" fill="none" marker-end="url(#arrowDim)" stroke-dasharray="4 4">
    <path d="M 780 400 L 780 460 L 1310 460 L 1310 538" />
  </g>
  <text x="1020" y="454" font-size="10" fill="#6b7a94">custom tool: rollout() → adapter</text>

  <!-- arrow from adapter (mp4) up into Judge card -->
  <g stroke="#6b7a94" stroke-width="1.8" fill="none" marker-end="url(#arrowDim)" stroke-dasharray="4 4">
    <path d="M 1220 538 L 1220 440 L 1100 440 L 1100 402" />
  </g>
  <text x="1120" y="432" font-size="10" fill="#6b7a94">mp4 → coarse / fine</text>

  <!-- ==========================================================
       OUTPUT strip (right)
       ========================================================== -->
  <g transform="translate(40,740)">
    <rect width="1600" height="185" rx="14" fill="#0f1729" stroke="#2a3a5c" />
    <text x="20" y="26" font-size="12" fill="#8ea0bf" font-weight="600" letter-spacing="0.10em">OUTPUTS</text>

    <!-- report.md -->
    <g transform="translate(20,42)">
      <rect width="360" height="120" rx="10" fill="#0b1425" stroke="#264033" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#b6f0c4">report.md</text>
      <text x="16" y="42" font-size="11" fill="#cfd6e4">Summary · Failure Clusters</text>
      <text x="16" y="58" font-size="11" fill="#cfd6e4">Per-label confusion · Methodology</text>
      <text x="16" y="82" font-size="10" fill="#8ea0bf">auditable markdown; the deliverable</text>
      <text x="16" y="96" font-size="10" fill="#8ea0bf">a human would otherwise write by hand</text>
    </g>

    <!-- Precision/recall -->
    <g transform="translate(400,42)">
      <rect width="360" height="120" rx="10" fill="#0b1425" stroke="#3a2a10" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#ffc896">Measured judge quality</text>
      <text x="16" y="44" font-size="11" fill="#cfd6e4">precision &amp; recall vs injected ground truth</text>
      <text x="16" y="64" font-size="11" fill="#cfd6e4">per-label confusion matrix</text>
      <text x="16" y="88" font-size="10" fill="#8ea0bf">&quot;eval the eval&quot; — the vision judge</text>
      <text x="16" y="102" font-size="10" fill="#8ea0bf">is itself graded, not assumed correct</text>
    </g>

    <!-- Cluster summary -->
    <g transform="translate(780,42)">
      <rect width="360" height="120" rx="10" fill="#0b1425" stroke="#26336a" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#9dc4ff">Failure clusters</text>
      <text x="16" y="44" font-size="11" fill="#cfd6e4">3–6 themes from the whole corpus,</text>
      <text x="16" y="60" font-size="11" fill="#cfd6e4">with counts + representative rollout</text>
      <text x="16" y="84" font-size="10" fill="#8ea0bf">clustered by reading every finding in</text>
      <text x="16" y="98" font-size="10" fill="#8ea0bf">one 1 M-context call — no k-means</text>
    </g>

    <!-- Cost & time headline -->
    <g transform="translate(1160,42)">
      <rect width="420" height="120" rx="10" fill="#0b1425" stroke="#5a4020" />
      <text x="16" y="22" font-size="13" font-weight="700" fill="#ffd27a">Headline vs. manual review</text>
      <text x="16" y="46" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#e6edf7">$X.XX  ·  Mm Ss  ·  N scenarios</text>
      <text x="16" y="68" font-size="11" fill="#cfd6e4">compared to reviewer at $75/hr ·</text>
      <text x="16" y="84" font-size="11" fill="#cfd6e4">~5 min/rollout sequential baseline</text>
      <text x="16" y="104" font-size="10" fill="#8ea0bf">this is the &quot;hours → minutes&quot; number</text>
    </g>
  </g>

  <!-- ==========================================================
       Live telemetry note (top right of agent band)
       ========================================================== -->
  <g transform="translate(1200,420)">
