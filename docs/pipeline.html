<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PolicyGrader — Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #fafafa;
    color: #1f1f1f;
    font-family: "Google Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-feature-settings: "tnum" 1;
  }
  .wrap {
    display: grid;
    place-items: center;
    padding: 24px 20px 48px;
  }
  svg {
    width: min(100%, 1680px);
    height: auto;
    display: block;
  }
  .footnote {
    max-width: 1680px;
    margin: 12px auto 0;
    font-size: 12px;
    color: #80868b;
    text-align: center;
  }
  .footnote a { color: #0b5fff; text-decoration: none; }
  .footnote a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
<!--
  At-a-glance figure (simplified). For the exhaustive version: pipeline-detailed.html.

  Goal: tell the story in ~5 seconds.
    1. "Powered by Opus 4.7 · Managed Agents" — foregrounded as the hero chip.
    2. Five-phase flow, one card each. The Judge card shows the ×K parallel
       sessions explicitly (stacked card treatment).
    3. Three Opus 4.7 surfaces pinned to the exact phase that uses them.
    4. Headline: the "hours → minutes" number.
-->
<svg viewBox="0 0 1680 810" xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-label="PolicyGrader — five-phase pipeline powered by Opus 4.7 Managed Agents."
     font-family='"Google Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif'>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3c4043" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b5fff" />
    </marker>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1680" height="810" fill="#fafafa" />

  <!-- =============================================================
       TITLE + HERO OPUS CHIP
       ============================================================= -->
  <g>
    <text x="40" y="44" font-size="11" font-weight="600" fill="#80868b" letter-spacing="2.4">
      FIGURE · ARCHITECTURE AT A GLANCE
    </text>
    <text x="40" y="82" font-size="30" font-weight="600" fill="#1f1f1f">
      PolicyGrader
      <tspan fill="#5f6368" font-weight="400"> — robot manipulation evals,</tspan>
      <tspan fill="#0b5fff" font-weight="600"> hours → minutes.</tspan>
    </text>
  </g>

  <!--
    Powered-by chip (Anthropic-styled — dark ink + cream, 8-spoke asterisk mark).
    Deliberately not Google blue / not a starburst.
  -->
  <g transform="translate(1200,28)">
    <rect width="440" height="70" rx="10" fill="#181818" />
    <!-- 8-spoke asterisk mark, drawn as 4 crossing line segments -->
    <g transform="translate(40,35)" stroke="#f0eee6" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-15" x2="0" y2="15" />
      <line x1="-15" y1="0" x2="15" y2="0" />
      <line x1="-10.6" y1="-10.6" x2="10.6" y2="10.6" />
      <line x1="-10.6" y1="10.6" x2="10.6" y2="-10.6" />
    </g>
    <text x="78" y="34" font-size="11" font-weight="600" fill="#a8a29e" letter-spacing="2.2">
      POWERED BY
    </text>
    <text x="78" y="58" font-size="19" font-weight="600" fill="#f0eee6">
      Opus 4.7 · Managed Agents
    </text>
  </g>

  <!-- =============================================================
       PIPELINE BAND · one session, five phases
       ============================================================= -->
  <!-- session band background -->
  <g transform="translate(40,130)">
    <rect width="1600" height="300" rx="16" fill="#ffffff" stroke="#dadce0" />
    <!-- session eyebrow -->
    <text x="24" y="30" font-size="11" font-weight="600" fill="#0b5fff" letter-spacing="2.4">
      ONE MANAGED AGENTS PIPELINE
    </text>
    <text x="260" y="30" font-size="11" fill="#80868b">
      English goal in · auditable markdown report out.
    </text>
  </g>

  <!--
    5 phases across the band. Each card is 260 wide, gap 32.
    Total: 5·260 + 4·32 = 1428. Band inner width: 1600 − 48 (margins) = 1552.
    Horizontal padding: (1552 − 1428)/2 = 62. Band starts at x=40 → inner start = 40+24+62 = 126.
    Row positions (card tops): y = 184. Height 190.
  -->

  <!-- INPUT: small label at left edge of band -->
  <g transform="translate(56,226)">
    <text font-size="10" font-weight="600" fill="#80868b" letter-spacing="1.8">GOAL</text>
    <text y="20" font-size="12" fill="#3c4043" font-style="italic" font-family='"Google Sans", sans-serif'>
      <tspan x="0" dy="0">“grade pick</tspan>
      <tspan x="0" dy="16">reliability on</tspan>
      <tspan x="0" dy="16">the Lift task.”</tspan>
    </text>
  </g>

  <!-- arrow INPUT → PLAN -->
  <path d="M 130 268 L 150 268" stroke="#3c4043" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- positions (x): 156, 448, 740, 1032, 1324 -->

  <!-- 1. PLAN -->
  <g transform="translate(156,188)">
    <rect width="260" height="180" rx="12" fill="#ffffff" stroke="#dadce0" />
    <rect x="0" y="0" width="260" height="4" rx="2" fill="#1967d2" />
    <g transform="translate(20,22)">
      <circle cx="12" cy="12" r="12" fill="#e3ecfd" stroke="#1967d2" />
      <text x="12" y="16" font-size="12" font-weight="700" fill="#1967d2" text-anchor="middle">1</text>
    </g>
    <text x="54" y="42" font-size="15" font-weight="600" fill="#1f1f1f">PLAN</text>
    <text x="20" y="78" font-size="13" fill="#3c4043">
      <tspan x="20" dy="0">Design the test suite:</tspan>
      <tspan x="20" dy="18">scenarios, seeds, budget,</tspan>
      <tspan x="20" dy="18">2-label taxonomy.</tspan>
    </text>
    <line x1="20" y1="142" x2="240" y2="142" stroke="#e8eaed" />
    <text x="20" y="160" font-size="11" font-family='"Roboto Mono", monospace' fill="#1967d2">plan.md</text>
  </g>

  <!-- 2. ROLLOUT -->
  <g transform="translate(448,188)">
    <rect width="260" height="180" rx="12" fill="#ffffff" stroke="#dadce0" />
    <rect x="0" y="0" width="260" height="4" rx="2" fill="#7b1fa2" />
    <g transform="translate(20,22)">
      <circle cx="12" cy="12" r="12" fill="#f3e5f9" stroke="#7b1fa2" />
      <text x="12" y="16" font-size="12" font-weight="700" fill="#7b1fa2" text-anchor="middle">2</text>
    </g>
    <text x="54" y="42" font-size="15" font-weight="600" fill="#1f1f1f">ROLLOUT</text>
    <text x="20" y="78" font-size="13" fill="#3c4043">
      <tspan x="20" dy="0">Run every scenario in</tspan>
      <tspan x="20" dy="18">sim.</tspan>
      <tspan fill="#b06000" font-weight="600"> Calibration</tspan>
      <tspan fill="#3c4043"> +</tspan>
      <tspan x="20" dy="18" fill="#1967d2" font-weight="600">deployment</tspan>
      <tspan fill="#3c4043"> cohorts on Lift.</tspan>
    </text>
    <line x1="20" y1="142" x2="240" y2="142" stroke="#e8eaed" />
    <text x="20" y="160" font-size="11" font-family='"Roboto Mono", monospace' fill="#7b1fa2">rollouts/*.mp4</text>
  </g>

  <!-- 2.5 LABEL -->
  <g transform="translate(740,188)">
    <rect width="260" height="180" rx="12" fill="#ffffff" stroke="#dadce0" />
    <rect x="0" y="0" width="260" height="4" rx="2" fill="#5f6368" />
    <g transform="translate(20,22)">
      <circle cx="12" cy="12" r="12" fill="#f4f5f7" stroke="#5f6368" />
      <text x="12" y="16" font-size="11" font-weight="700" fill="#5f6368" text-anchor="middle">2.5</text>
    </g>
    <text x="54" y="42" font-size="15" font-weight="600" fill="#1f1f1f">LABEL</text>
    <text x="20" y="78" font-size="13" fill="#3c4043">
      <tspan x="20" dy="0">Human labels 6–20</tspan>
      <tspan x="20" dy="18">calibration clips — the</tspan>
      <tspan x="20" dy="18">only ground truth.</tspan>
    </text>
    <line x1="20" y1="142" x2="240" y2="142" stroke="#e8eaed" />
    <text x="20" y="160" font-size="11" font-family='"Roboto Mono", monospace' fill="#b06000">human_labels.jsonl</text>
  </g>

  <!--
    3. JUDGE — K parallel Managed Agents sessions.
    Visual: fan-in of K blue arrows from LABEL spreads into K stacked session cards;
    each back card's header strip peeks out on the right; prominent "K AGENTS" pill
    on the front card.
  -->

  <!-- Fan-in: 4 arrows diverging from LABEL's right edge at (1000, 278) into 4 session cards -->
  <g stroke="#0b5fff" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue)" opacity="0.9">
    <path d="M 1000 278 L 1026 212" />
    <path d="M 1000 278 L 1024 236" />
    <path d="M 1000 278 L 1024 260" />
    <path d="M 1000 278 L 1026 284" />
  </g>

  <g transform="translate(1032,188)">
    <!-- Session 4 (back-most): only right & bottom peek strips visible -->
    <rect x="24" y="24" width="260" height="180" rx="12" fill="#fffaef" stroke="#f2c974" />
    <rect x="24" y="24" width="260" height="4" rx="2" fill="#b06000" />

    <!-- Session 3 -->
    <rect x="16" y="16" width="260" height="180" rx="12" fill="#fffaef" stroke="#f2c974" />
    <rect x="16" y="16" width="260" height="4" rx="2" fill="#b06000" />

    <!-- Session 2 -->
    <rect x="8" y="8" width="260" height="180" rx="12" fill="#fffaef" stroke="#f2c974" />
    <rect x="8" y="8" width="260" height="4" rx="2" fill="#b06000" />

    <!-- Session 1 (front card, full content) -->
    <rect width="260" height="180" rx="12" fill="#ffffff" stroke="#dadce0" />
    <rect x="0" y="0" width="260" height="4" rx="2" fill="#b06000" />

    <g transform="translate(20,22)">
      <circle cx="12" cy="12" r="12" fill="#fef1d8" stroke="#b06000" />
      <text x="12" y="16" font-size="12" font-weight="700" fill="#b06000" text-anchor="middle">3</text>
    </g>
    <text x="54" y="42" font-size="15" font-weight="600" fill="#1f1f1f">JUDGE</text>

    <!-- Prominent K-parallel-agents pill on the front card -->
    <g transform="translate(110,22)">
      <rect width="132" height="24" rx="12" fill="#0b5fff" />
      <circle cx="14" cy="12" r="4" fill="#ffffff" />
      <circle cx="24" cy="12" r="4" fill="#ffffff" opacity="0.8" />
      <circle cx="34" cy="12" r="4" fill="#ffffff" opacity="0.55" />
      <circle cx="44" cy="12" r="4" fill="#ffffff" opacity="0.35" />
      <text x="60" y="16" font-size="11" font-weight="700" fill="#ffffff" font-family='"Roboto Mono", monospace' letter-spacing="0.6">K AGENTS</text>
    </g>

    <text x="20" y="80" font-size="13" fill="#3c4043">
      <tspan x="20" dy="0">K Managed Agents run in</tspan>
      <tspan x="20" dy="18">parallel — each names the</tspan>
      <tspan x="20" dy="18">failure frame + points at it.</tspan>
    </text>
    <line x1="20" y1="144" x2="240" y2="144" stroke="#e8eaed" />
    <text x="20" y="164" font-size="11" font-family='"Roboto Mono", monospace' fill="#b06000">findings.jsonl</text>
  </g>


  <!-- 4. REPORT -->
  <g transform="translate(1356,188)">
    <rect width="260" height="180" rx="12" fill="#ffffff" stroke="#dadce0" />
    <rect x="0" y="0" width="260" height="4" rx="2" fill="#137333" />
    <g transform="translate(20,22)">
      <circle cx="12" cy="12" r="12" fill="#e6f4ea" stroke="#137333" />
      <text x="12" y="16" font-size="12" font-weight="700" fill="#137333" text-anchor="middle">4</text>
    </g>
    <text x="54" y="42" font-size="15" font-weight="600" fill="#1f1f1f">REPORT</text>
    <text x="20" y="78" font-size="13" fill="#3c4043">
      <tspan x="20" dy="0">Cluster the whole corpus,</tspan>
      <tspan x="20" dy="18">score the judge, decorate</tspan>
      <tspan x="20" dy="18">findings with trust chips.</tspan>
    </text>
    <line x1="20" y1="142" x2="240" y2="142" stroke="#e8eaed" />
    <text x="20" y="160" font-size="11" font-family='"Roboto Mono", monospace' fill="#137333">report.md</text>
  </g>

  <!-- arrows between phase cards (y = 268 centers). LABEL → JUDGE is drawn as a fan-in above. -->
  <g stroke="#3c4043" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 418 278 L 446 278" />
    <path d="M 710 278 L 738 278" />
    <!-- JUDGE → REPORT: starts past the Judge stack's right edge (x=1316) so it doesn't cut through the back cards -->
    <path d="M 1320 278 L 1354 278" />
  </g>

  <!-- =============================================================
       OPUS 4.7 CAPABILITY CALLOUTS — tethered to the phase using them
       ============================================================= -->

  <!-- Callout B: 2576 px vision + pointing → Judge (tether from below) -->
  <g>
    <path d="M 1162 430 L 1162 410 L 1162 368"
          stroke="#0b5fff" stroke-width="1" stroke-dasharray="3 3" fill="none" />
    <g transform="translate(980,440)">
      <rect width="300" height="38" rx="19" fill="#ffffff" stroke="#8ab4f8" />
      <circle cx="20" cy="19" r="6" fill="#0b5fff" />
      <text x="36" y="23" font-size="12" fill="#1f1f1f" font-weight="500">
        <tspan font-weight="600" fill="#0b5fff">2576 px + pointing</tspan>
        <tspan fill="#3c4043"> · or abstain</tspan>
      </text>
    </g>
  </g>

  <!-- Callout C: 1 M context → Report (tether from below) -->
  <g>
    <path d="M 1486 430 L 1486 410 L 1486 368"
          stroke="#0b5fff" stroke-width="1" stroke-dasharray="3 3" fill="none" />
    <g transform="translate(1336,440)">
      <rect width="300" height="38" rx="19" fill="#ffffff" stroke="#8ab4f8" />
      <circle cx="20" cy="19" r="6" fill="#0b5fff" />
      <text x="36" y="23" font-size="12" fill="#1f1f1f" font-weight="500">
        <tspan font-weight="600" fill="#0b5fff">1 M context</tspan>
        <tspan fill="#3c4043"> · 1-call clustering</tspan>
      </text>
    </g>
  </g>

  <!--
    Callout: REPORT writes the compact savings table on the right.
    Solid dark connector from Report's bottom-right corner, routed right around the
    1 M context pill, landing on the top of the savings callout box.
  -->
  <g>
    <path d="M 1556 368 L 1556 432 L 1300 432 L 1300 506"
          stroke="#3c4043" stroke-width="1.5" fill="none"
          marker-end="url(#arrow)" />
    <!-- "report.md" tag sitting just above the horizontal leg of the connector -->
    <g transform="translate(1392,418)">
      <rect width="80" height="20" rx="4" fill="#ffffff" stroke="#dadce0" />
      <text x="40" y="14" font-size="11" font-family='"Roboto Mono", monospace'
            fill="#3c4043" text-anchor="middle" font-weight="600">report.md</text>
    </g>
  </g>

  <!-- =============================================================
       SAVINGS CALLOUT · "THIS RUN VS MANUAL REVIEW"
       Compact 3×2 card on the right, sized to feel like a callout box
       attached to the Report phase. Same Overview-page styling, smaller scale.
       ============================================================= -->
  <g transform="translate(1140,510)">
    <!-- card outer -->
    <rect width="500" height="252" rx="10" fill="#ffffff" stroke="#dadce0" />

    <!-- eyebrow -->
    <text x="20" y="32" font-size="10" font-weight="600" fill="#5f6368" letter-spacing="2.2"
          font-family='"Roboto Mono", monospace'>
      THIS RUN VS MANUAL REVIEW
    </text>

    <!-- header underline + 2 vertical column dividers + mid-row hairline -->
    <line x1="20" y1="46" x2="480" y2="46" stroke="#e8eaed" />
    <line x1="173" y1="46" x2="173" y2="232" stroke="#e8eaed" />
    <line x1="327" y1="46" x2="327" y2="232" stroke="#e8eaed" />
    <line x1="20" y1="140" x2="480" y2="140" stroke="#e8eaed" />

    <!-- ───────── ROW 1 · the run vs the baseline ───────── -->

    <!-- COST -->
    <g transform="translate(36,62)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>COST</text>
      <text y="38" font-size="26" font-weight="600" fill="#1f1f1f"
            font-family='"Google Sans", sans-serif'>$1,200</text>
      <text y="62" font-size="11" fill="#5f6368">
        <tspan text-decoration="line-through">$7,500</tspan><tspan>  </tspan><tspan fill="#137333" font-weight="600">−84%</tspan>
      </text>
    </g>

    <!-- WALL TIME -->
    <g transform="translate(189,62)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>WALL TIME</text>
      <text y="38" font-size="26" font-weight="600" fill="#1f1f1f"
            font-family='"Google Sans", sans-serif'>5h 30m</text>
      <text y="62" font-size="11" fill="#5f6368">
        <tspan text-decoration="line-through">100h</tspan><tspan>  </tspan><tspan fill="#137333" font-weight="600">−94%</tspan>
      </text>
    </g>

    <!-- SCENARIOS -->
    <g transform="translate(343,62)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>SCENARIOS</text>
      <text y="38" font-size="26" font-weight="600" fill="#1f1f1f"
            font-family='"Google Sans", sans-serif'>2,000</text>
      <text y="62" font-size="11" fill="#5f6368">
        <tspan fill="#b06000" font-weight="500">1,200 cal</tspan><tspan> · </tspan><tspan fill="#1967d2" font-weight="500">800 dep</tspan>
      </text>
    </g>

    <!-- ───────── ROW 2 · eval the eval ───────── -->

    <!-- PRECISION -->
    <g transform="translate(36,156)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>PRECISION</text>
      <text y="38" font-family='"Google Sans", sans-serif'>
        <tspan font-size="26" font-weight="600" fill="#1f1f1f">91</tspan><tspan font-size="15" font-weight="500" fill="#5f6368">%</tspan>
      </text>
      <text y="62" font-size="11" fill="#5f6368">CI 62 — 98</text>
    </g>

    <!-- RECALL -->
    <g transform="translate(189,156)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>RECALL</text>
      <text y="38" font-family='"Google Sans", sans-serif'>
        <tspan font-size="26" font-weight="600" fill="#1f1f1f">87</tspan><tspan font-size="15" font-weight="500" fill="#5f6368">%</tspan>
      </text>
      <text y="62" font-size="11" fill="#5f6368">CI 55 — 95</text>
    </g>

    <!-- CLUSTERS -->
    <g transform="translate(343,156)">
      <text font-size="10" font-weight="600" fill="#5f6368" letter-spacing="1.6"
            font-family='"Roboto Mono", monospace'>CLUSTERS</text>
      <text y="38" font-size="26" font-weight="600" fill="#1f1f1f"
            font-family='"Google Sans", sans-serif'>6</text>
      <text y="62" font-size="11" fill="#5f6368">from 1 M ctx</text>
    </g>
  </g>

  <!-- footnote (bottom-left, balancing the right-aligned callout) -->
  <text x="40" y="784" font-size="11" fill="#80868b">
    Cost baseline: $75/hr × 3 min/rollout (labor). Time baseline: sum of video durations + 60 s/rollout (sequential review).
  </text>
</svg>
<div class="footnote">
  Simplified overview. For the exhaustive version with cohort substrate and calibration results, see <a href="pipeline-detailed.html">pipeline-detailed.html</a>.
</div>
</div>
</body>
</html>
